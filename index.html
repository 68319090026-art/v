<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Sweet Home Security ✨</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Mali:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-soft-pink: #ffdae9;
            --color-sakura: #ffb7d5;
            --color-mint: #b2f2bb;
            --color-sky: #a5d8ff;
            --bg-gradient: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
            --glass: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: 'Mali', cursive;
            background: #fff5f8;
            color: #5d4037;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(#ffdae9 2px, transparent 2px),
                radial-gradient(#ffdae9 2px, transparent 2px);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
        }

        /* --- พื้นหลังฟรุ้งฟริ้ง --- */
        .floating-hearts {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
        }
        .heart {
            position: absolute; color: var(--color-sakura);
            animation: heartFloat 10s linear infinite; opacity: 0.6;
        }
        @keyframes heartFloat {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .dashboard { width: 95%; max-width: 1000px; padding: 20px; z-index: 1; }

        /* หัวข้อ */
        .header { 
            text-align: center; margin-bottom: 30px; 
            background: var(--glass); padding: 20px; border-radius: 40px;
            box-shadow: 0 10px 30px rgba(255,183,213,0.3);
        }
        h1 { font-size: 2.2rem; margin: 0; color: #ff85b3; text-shadow: 2px 2px #fff; }
        #clock { font-size: 2.5rem; font-weight: bold; color: #ffb7d5; font-family: 'Itim'; }

        /* การ์ดนุ่มนิ่ม */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { 
            background: var(--glass); border-radius: 40px; padding: 30px; text-align: center;
            border: 4px solid #fff; box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            transition: transform 0.3s ease; backdrop-filter: blur(10px);
        }
        .card:hover { transform: scale(1.02); }

        /* มาตรวัดความร้อนแบบมินิมอล */
        .gauge-wrap { 
            width: 50px; height: 150px; background: #fff; border-radius: 25px; 
            margin: 15px auto; position: relative; border: 3px solid var(--color-soft-pink); overflow: hidden; 
        }
        #temp-bar { 
            position: absolute; bottom: 0; width: 100%; height: 0%; 
            background: linear-gradient(to top, #ff99c8, #fcf6bd); 
            transition: 1s ease-out;
        }

        .big-val { font-size: 4rem; font-weight: bold; margin: 10px 0; color: #ff85b3; font-family: 'Itim'; }
        .sub-val-text { font-size: 2.5rem; font-weight: bold; color: #74c0fc; font-family: 'Itim'; }
        #sec-text { font-size: 1.5rem; font-weight: bold; margin-top: 10px; }

        /* ปุ่มไล่ผู้บุกรุกแบบ Soft */
        #panic-btn {
            width: 130px; height: 130px; border-radius: 50%; background: #fff; 
            border: 8px solid var(--color-sakura); color: #ff85b3; font-family: 'Mali';
            font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s;
            box-shadow: 0 8px 20px rgba(255, 133, 179, 0.3);
        }
        #panic-btn:hover { background: var(--color-sakura); color: #fff; }
        #panic-btn:active { transform: scale(0.9); }

        /* อุปกรณ์ตกแต่ง */
        .device-box {
            flex-grow:1; background: var(--glass); border-radius: 40px; padding: 20px; 
            display: flex; justify-content: space-around; border: 4px solid #fff;
        }

        /* ตารางประวัติ */
        .log-box { 
            background: var(--glass); border-radius: 40px; padding: 25px; margin-top: 25px; 
            border: 4px solid #fff; backdrop-filter: blur(10px);
        }
        table { width: 100%; border-collapse: collapse; }
        th { color: #ff85b3; padding: 12px; border-bottom: 2px solid var(--color-soft-pink); }
        td { padding: 12px; border-bottom: 1px solid #fff; text-align: center; }

    </style>
</head>
<body>

<div class="floating-hearts" id="heart-container"></div>

<div class="dashboard">
    <div class="header">
        <h1>🎀 My Sweet Home IOT 🎀</h1>
        <div style="color:#adb5bd; font-size: 0.9rem;" id="date">--/--/----</div>
        <div id="clock">00:00:00</div>
    </div>

    <div class="grid">
        <div class="card">
            <div style="color:#ff85b3; font-size:1.2rem; font-weight:bold;">อุณหภูมิห้อง 🌡️</div>
            <div class="gauge-wrap"><div id="temp-bar"></div></div>
            <div class="big-val" id="t-val">--</div>
            <small style="color:#ff99c8;">องศาเซลเซียส</small>
        </div>

        <div class="card">
            <div style="color:#4dabf7; font-size:1.2rem; font-weight:bold;">ความสดชื่น 🌿</div>
            <div style="margin: 25px 0;">
                <div style="color:#868e96;">ความชื้นอากาศ ☁️</div>
                <div class="sub-val-text"><span id="h-val">--</span><small style="font-size:1rem">%</small></div>
            </div>
            <div style="padding-top: 20px; border-top: 2px dashed #ffdae9;">
                <div style="color:#868e96;">ความชื้นในดิน 🪴</div>
                <div class="sub-val-text" style="color:#69db7c;"><span id="s-val">--</span><small style="font-size:1rem">%</small></div>
            </div>
        </div>

        <div class="card">
            <div style="color:#ff6b6b; font-size:1.2rem; font-weight:bold;">ความปลอดภัย 🏠</div>
            <div id="sec-icon" style="font-size: 6rem; margin: 20px 0;">🧸</div>
            <div id="sec-text" style="color: #51cf66;">บ้านปลอดภัยดีค่ะ</div>
        </div>
    </div>

    <div style="display: flex; gap: 15px; align-items: center; margin: 25px 0; flex-wrap: wrap;">
        <button id="panic-btn" onmousedown="setPanic(1)" onmouseup="setPanic(0)" ontouchstart="setPanic(1)" ontouchend="setPanic(0)">
            กดค้าง<br>ไล่คนใจร้ายพ้น!
        </button>
        <div class="device-box">
            <div style="text-align:center;"><span id="bulb1" style="font-size:3rem; opacity:0.2; filter: grayscale(1);">🔔</span><br><small>เสียงเตือน</small></div>
            <div style="text-align:center;"><span id="bulb2" style="font-size:3rem; opacity:0.2; filter: grayscale(1);">🌬️</span><br><small>พัดลม</small></div>
            <div style="text-align:center;"><span id="spk-icon" style="font-size:3rem; opacity:0.2; filter: grayscale(1);">🎵</span><br><small>เพลง</small></div>
        </div>
    </div>

    <div class="log-box">
        <h2 style="color:#ff85b3; margin-top:0; font-size: 1.2rem;">📖 บันทึกความเรียบร้อยของบ้าน</h2>
        <div style="max-height: 200px; overflow-y: auto;">
            <table>
                <thead><tr><th>เวลา</th><th>เหตุการณ์</th><th>สถานะ</th></tr></thead>
                <tbody id="log-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Create floating hearts
    const container = document.getElementById('heart-container');
    for(let i=0; i<15; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.innerHTML = '🌸';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
        heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
        container.appendChild(heart);
    }

    const firebaseConfig = { databaseURL: "https://viewvi-3e5ef-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    setInterval(() => {
        const now = new Date();
        document.getElementById('date').innerText = now.toLocaleDateString('th-TH', { day:'2-digit', month:'long', year:'numeric' });
        document.getElementById('clock').innerText = now.toLocaleTimeString('th-TH');
    }, 1000);

    function setPanic(v) { 
        db.ref("/").update({ panicMode: v }); 
        if(v) addLog("คำสั่งพิเศษ", "ส่งเสียงไล่ผู้บุกรุก 📢", true); 
    }

    function addLog(type, msg, alert) {
        const tbody = document.getElementById("log-body");
        const row = document.createElement("tr");
        const now = new Date();
        row.innerHTML = `<td>${now.toLocaleTimeString('th-TH')}</td><td><b>${type}</b>: ${msg}</td><td style="color:${alert?'#ff6b6b':'#51cf66'}">${alert?'เตือนภัย':'ปกติค่ะ'}</td>`;
        tbody.prepend(row);
    }

    let lastSec = 0; let lastT = false;
    db.ref("/").on("value", (snap) => {
        const data = snap.val();
        if (data) {
            const t = data.temperature || 0;
            const sec = data.Security == 1;

            document.getElementById("t-val").innerText = t;
            document.getElementById("temp-bar").style.height = Math.min(t * 2, 100) + "%";
            document.getElementById("h-val").innerText = data.Humidity || "--";
            document.getElementById("s-val").innerText = data.Soil || "--";

            const sIcon = document.getElementById("sec-icon");
            const sText = document.getElementById("sec-text");
            
            if(sec) {
                sIcon.innerText = "🙀";
                sText.innerText = "มีใครไม่รู้มาค่ะ!";
                sText.style.color = "#ff6b6b";
            } else {
                sIcon.innerText = "🧸";
                sText.innerText = "บ้านปลอดภัยดีค่ะ";
                sText.style.color = "#51cf66";
            }

            // Icons Update
            document.getElementById("bulb1").style.opacity = sec ? "1" : "0.2";
            document.getElementById("bulb1").style.filter = sec ? "grayscale(0)" : "grayscale(1)";
            
            document.getElementById("bulb2").style.opacity = t > 30 ? "1" : "0.2";
            document.getElementById("bulb2").style.filter = t > 30 ? "grayscale(0)" : "grayscale(1)";

            document.getElementById("spk-icon").style.opacity = (sec || data.panicMode) ? "1" : "0.2";
            document.getElementById("spk-icon").style.filter = (sec || data.panicMode) ? "grayscale(0)" : "grayscale(1)";

            if(sec && !lastSec) { addLog("ความปลอดภัย", "ตรวจพบการเคลื่อนไหว", true); lastSec = 1; } else if(!sec) lastSec = 0;
            if(t > 30 && !lastT) { addLog("อุณหภูมิ", `อากาศร้อนเกินไป (${t}°C)`, true); lastT = true; } else if(t <= 30) lastT = false;
        }
    });
</script>
</body>
</html>
